<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a7bd5"/>
      <stop offset="1" stop-color="#1f4e8c"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="62" height="62" rx="14" fill="url(#bg)"/>

  <!-- stack of indexed files behind the glass -->
  <rect x="14" y="14" width="20" height="26" rx="2" fill="#ffffff" opacity="0.9"/>
  <rect x="18" y="20" width="12" height="2.4" rx="1.2" fill="#1f4e8c"/>
  <rect x="18" y="25" width="12" height="2.4" rx="1.2" fill="#1f4e8c"/>
  <rect x="18" y="30" width="8" height="2.4" rx="1.2" fill="#1f4e8c"/>

  <!-- magnifying glass -->
  <circle cx="38" cy="34" r="13" fill="none" stroke="#ffffff" stroke-width="5.5"/>
  <line x1="47.2" y1="43.2" x2="56" y2="52" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round"/>
</svg>
